name: Check Model Status

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-status:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run status checks
        env:
          KIVEST_API_KEY: ${{ secrets.KIVEST_API_KEY }}
          API_PROXY_URL: ${{ secrets.API_PROXY_URL }}
          PROXY_TOKEN: ${{ secrets.PROXY_TOKEN }}
        run: node scripts/check-models.js

      - name: Commit updated status data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/status.json data/history.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update model status [skip ci]"
            git pull --rebase origin main
            git push
          fi
